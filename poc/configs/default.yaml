# VODAI PoC デフォルト設定

# LLM プロバイダー設定
# provider: "ollama" (ローカル開発) or "openai" (本番)
llm:
  provider: ollama
  ollama:
    base_url: http://localhost:11434/v1
    model: gemma3:4b
  openai:
    model_correction: gpt-5.1-mini 
    model_summary: gpt-5.1-mini

# 音声抽出
audio:
  sample_rate: 16000
  channels: 1

# ASR (WhisperX)
# モデルサイズ: tiny < base < small < medium < large-v3
# CPU環境では medium 以下を推奨（large-v3 は GPU 前提）
asr:
  model_name: medium
  # model_name: large-v3
  language: ja
  batch_size: 16
  compute_type: int8
  # compute_type: float16

# 誤字補正
correction:
  chunk_size: 10
  max_retries: 3
  temperature: 0.1
  confidence_threshold: 0.7

# シーン検出
scene:
  threshold: 40.0         # 27.0 → 40.0: 検出感度を下げてシーン数を圧縮
  min_scene_len: 45       # 15 → 45: 30fpsで約1.5秒
  merge_threshold: 2.0    # この秒数未満の短シーンを次シーンにマージ

# シーン要約
scene_summary:
  max_tokens: 500

# 感情推定
emotion:
  dimensional:
    model: audeering/wav2vec2-large-robust-12-ft-emotion-msp-dim
  text:
    model: Mizuiro-sakura/luke-japanese-large-sentiment-analysis-wrime
  prosody:
    enabled: true
  fusion:
    text_weight: 0.6
    dimensional_weight: 0.2     # 次元感情のブレンド比率（0.5→0.2に低減）
    neutral_zone: [0.35, 0.65]  # neutralゾーン拡大（0.4-0.6→0.35-0.65）

# 出力
output:
  formats:
    - json
    - srt
    - vtt
  dir: poc/output

# VODAI PoC デフォルト設定

# LLM プロバイダー設定
# provider: "ollama" (ローカル開発) or "openai" (本番)
llm:
  provider: ollama
  ollama:
    base_url: http://localhost:11434/v1
    model: gemma3:12b
    timeout: 300  # API呼び出しタイムアウト（秒）
  openai:
    model_correction: gpt-5.1-mini 
    model_summary: gpt-5.1-mini

# 音声抽出
audio:
  sample_rate: 16000
  channels: 1

# ASR (WhisperX)
# モデルサイズ: tiny < base < small < medium < large-v3
# CPU環境では medium 以下を推奨（large-v3 は GPU 前提）
asr:
  model_name: medium
  # model_name: large-v3
  language: ja
  batch_size: 16
  compute_type: int8
  # compute_type: float16
  diarization:
    enabled: true
    min_speakers: 1
    max_speakers: 4

# 誤字補正
correction:
  chunk_size: 3
  max_retries: 3
  temperature: 0.1
  confidence_threshold: 0.7

# シーン検出
scene:
  threshold: 40.0         # 27.0 → 40.0: 検出感度を下げてシーン数を圧縮
  min_scene_len: 45       # 15 → 45: 30fpsで約1.5秒
  merge_threshold: 2.0    # この秒数未満の短シーンを次シーンにマージ

# シーン要約
scene_summary:
  max_tokens: 500

# 感情推定
emotion:
  dimensional:
    model: audeering/wav2vec2-large-robust-12-ft-emotion-msp-dim
  speech:
    model: ehcalabres/wav2vec2-lg-xlsr-en-speech-emotion-recognition
    temperature: 0.5        # softmax 温度スケーリング（低いほど分布が尖る）
  prosody:
    enabled: true
  fusion:
    speech_weight: 0.5          # SER の重み
    dimensional_weight: 0.3     # 次元感情の重み
    prosody_boost: 0.2          # prosody による arousal 調整の最大幅
    neutral_zone: [0.45, 0.55]  # neutralゾーン縮小（0.35-0.65→0.45-0.55）

# 動画エクスポート（--export-video 指定時）
video_export:
  font_size: 48
  transcript_font_size: 24  # トランスクリプト字幕のフォントサイズ
  # font_name: "Yu Gothic"  # fontconfig フォント名（省略時はOSデフォルト）

# 出力
output:
  formats:
    - json
    - srt
    - vtt
  dir: poc/output
